<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ project.title }} — Project Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light py-5">
    <div class="container" style="max-width: 600px;">
        <a href="/" class="btn btn-outline-secondary mb-4">&larr; Back to Portfolio</a>
        <div class="card shadow-sm border-0 p-4">
            <span class="badge bg-secondary text-uppercase w-auto mb-2" style="width: fit-content;">{{ project.category }}</span>
            <h1 class="fw-bold text-dark">{{ project.title }}</h1>
            <p class="lead text-muted mt-3">{{ project.description }}</p>
        </div>
    </div>
</body>
</html>
