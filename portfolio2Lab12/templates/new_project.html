<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add New Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light py-5">
    <div class="container" style="max-width: 600px;">
        <a href="/" class="btn btn-outline-secondary mb-4">&larr; Back to Portfolio</a>
        
        <div class="card shadow-sm border-0 p-4">
            <h2 class="fw-bold mb-4">Add New Project</h2>
            
            <form action="/projects/new" method="POST">
                <div class="mb-3">
                    <label class="form-label font-weight-bold">Project Title</label>
                    <input type="text" name="title" class="form-control" required placeholder="e.g. AI Mobile App">
                </div>
                
                <div class="mb-3">
                    <label class="form-label font-weight-bold">Category</label>
                    <input type="text" name="category" class="form-control" placeholder="e.g. Mobile / Web / Machine Learning">
                </div>
                
                <div class="mb-3">
                    <label class="form-label font-weight-bold">Project URL</label>
                    <input type="text" name="url" class="form-control" placeholder="https://github.com/...">
                </div>
                
                <div class="mb-3">
                    <label class="form-label font-weight-bold">Description</label>
                    <textarea name="description" class="form-control" rows="4" required placeholder="Short description of the project..."></textarea>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 mt-2">Save Project to Database</button>
            </form>
        </div>
    </div>
</body>
</html>
